<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password | Solarbean Energies</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-page">
  <header class="site-header">
    <a href="index.html" class="logo-link">
      <img src="logo.jpeg" alt="Solarbean Energies" class="header-logo" />
    </a>
    <nav>
      <ul class="nav-menu">
        <li><a href="index.html#consultation">Our Offerings</a></li>
        <li><a href="index.html#solutions-section">Solar Solutions</a></li>
        <li><a href="index.html#on-grid">Our Presence</a></li>
      </ul>
    </nav>
    <div class="header-actions">
      <a href="login.html" class="btn btn-primary">Login</a>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-card">
      <h1>Forgot Password</h1>
      <p class="sub">Enter your email and we will send you a password reset link.</p>
      <div id="auth-message" class="message-box" aria-live="polite"></div>
      <form id="forgot-form">
        <div class="form-group">
          <label for="forgot-email">Email *</label>
          <input type="email" id="forgot-email" name="email" required placeholder="you@example.com" />
        </div>
        <button type="submit" class="btn btn-primary">Send Reset Link</button>
      </form>
      <p class="footer-link"><a href="login.html">Back to login</a></p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="supabaseClient.js"></script>
  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof initNavInteractions === 'function') {
        initNavInteractions();
      }
      if (typeof updateHeaderAuthState === 'function') {
        updateHeaderAuthState();
      }

      function showMessage(type, message) {
        var el = document.getElementById('auth-message');
        if (!el) return;
        el.textContent = message;
        el.className = 'message-box ' + (type === 'success' ? 'message-success' : 'message-error');
      }

      document.getElementById('forgot-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        var email = document.getElementById('forgot-email').value.trim();
        if (!email) {
          showMessage('error', 'Please enter your email address.');
          return;
        }

        try {
          const { data, error } = await supabaseClient.auth.resetPasswordForEmail(email, {
            redirectTo: window.location.origin + '/login.html'
          });
          if (error) throw error;
          showMessage('success', 'Reset password email sent. Please check your inbox.');
        } catch (err) {
          console.error('Forgot password error:', err);
          showMessage('error', 'Unable to send reset email: ' + (err.message || 'Please try again.'));
        }
      });
    });
  </script>
</body>
</html>
